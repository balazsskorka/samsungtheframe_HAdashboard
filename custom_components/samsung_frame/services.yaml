update:
  name: Update Frame Art
  description: Push a random image with overlay to the Samsung Frame TV.
  fields:
    image_path:
      name: Image Path
      description: Optional path to a specific image. If omitted, a random image from the configured media folder is used.
      required: false
      example: /media/frame/my_photo.jpg
      selector:
        text:

delete_all_tv_images:
  name: Delete All TV Images
  description: >
    Queries the Samsung Frame TV for all user-uploaded images and deletes them
    one by one. Useful for cleaning up the art library before pushing new content.
  fields: {}
